<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Zone Signup</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="https://img.freepik.com/free-psd/modern-car-isolated_23-2151504546.jpg?semt=ais_hybrid" type="image/x-icon">
</head>
<body>
    <div class="title">
        <h1>Car Zone</h1>
    </div>
    <div class="container">
        <h1>Signup Page</h1>
        <form action="./login.html" method="post" id="form2">
            <input type="email" name="email" placeholder="Enter email Id" required/>
            <input type="password" name="pw" placeholder="Enter password " required/>
            <input type="password" name="pw1" placeholder="Confirm password " required/>
            <button type="submit">Signup</button>
            
        </form>
        <button type="button"><a href="./index.html">BACK</a></button>
    </div>
    <script src="./signup.js"></script>
</body>
</html>
